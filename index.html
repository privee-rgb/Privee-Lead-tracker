<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - The Privee Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f7f5;
      position: relative;
      overflow: hidden;
      color: #1a1a1a;
    }
    
    /* Dynamic background gradients */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      animation: float 20s infinite alternate;
    }
    .shape-1 {
      width: 600px;
      height: 600px;
      background: rgba(224, 120, 161, 0.4);
      top: -200px;
      left: -200px;
    }
    .shape-2 {
      width: 500px;
      height: 500px;
      background: rgba(137, 196, 216, 0.4);
      bottom: -150px;
      right: -100px;
      animation-delay: -5s;
    }
    .shape-3 {
      width: 400px;
      height: 400px;
      background: rgba(230, 230, 250, 0.6);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 25s;
    }
    
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }
    
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.04), 0 4px 12px rgba(224, 120, 161, 0.05);
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes fadeUp {
      to { transform: translateY(0); opacity: 1; }
    }
    
    .logo {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .logo span {
      color: #E078A1;
    }
    
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 2.5rem;
      font-weight: 400;
    }
    
    .input-grp {
      margin-bottom: 1.25rem;
    }
    .input-grp label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
      margin-left: 4px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-grp input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(224, 221, 216, 0.8);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      transition: all 0.3s ease;
    }
    .input-grp input:focus {
      outline: none;
      border-color: #E078A1;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(224, 120, 161, 0.1);
    }
    .input-grp input::placeholder {
      color: #bbb;
    }
    
    .actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1.5rem;
    }
    .actions a {
      font-size: 12px;
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
      font-weight: 500;
    }
    .actions a:hover {
      color: #E078A1;
    }
    
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #E078A1;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(224, 120, 161, 0.25);
    }
    .btn-submit:hover {
      background: #c9608c;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(224, 120, 161, 0.35);
    }
    .btn-submit:active {
      transform: translateY(0);
    }
    
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -10px;
      margin-left: -10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .btn-text {
      display: inline-block;
      transition: opacity 0.2s;
    }
    .btn-submit.loading .btn-text {
      opacity: 0;
    }
    .btn-submit.loading .spinner {
      display: block;
    }
  </style>
</head>
<body>

  <!-- Dynamic aesthetic blobs -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="login-wrapper">
    <div class="logo">The <span>Privee</span> Group</div>
    <div class="subtitle">Lead Tracker Portal</div>
    
    <form id="authForm">
      <div class="input-grp">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="example@thepriveegroup.com" required autocomplete="email">
        </div>
      </div>
      
      <div class="input-grp">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      
      <div class="actions">
        <a href="#">Forgot password?</a>
      </div>
      
      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    document.getElementById('authForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');
      btn.style.pointerEvents = 'none';
      
      // Artificial delay to show off the premium feel and simulate auth
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
